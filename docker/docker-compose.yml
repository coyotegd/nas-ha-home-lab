services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - /volume1/docker/configs/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-America/New_York}
    restart: unless-stopped
    network_mode: host
    privileged: true

  npm:
    container_name: npm
    image: jc21/nginx-proxy-manager:latest
    ports:
      - 80:80
      - 443:443
      - 8181:81
    volumes:
      - /volume1/docker/configs/nginx-proxy-manager/data:/data
      - /volume1/docker/configs/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:stable
    volumes:
      - /volume1/docker/configs/esphome:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-America/New_York}
    restart: unless-stopped
    ports:
      - 6052:6052

  matter-server:
    container_name: matter-server
    image: ghcr.io/matter-js/python-matter-server:stable
    restart: unless-stopped
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - /volume1/docker/configs/matter-server/data:/data
      - /run/dbus:/run/dbus:ro

  zwave-js-ui:
    container_name: zwave-js-ui
    image: zwavejs/zwave-js-ui:latest
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    environment:
      - TZ=${TZ:-America/New_York}
      - SESSION_SECRET=${ZWAVEJS_SESSION_SECRET}
    network_mode: host
    volumes:
      - /volume1/docker/configs/zwavejsui:/usr/src/app/store
